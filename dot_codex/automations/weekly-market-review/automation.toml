name = "Weekly market review"
prompt = "You are an equity research analyst and portfolio strategist.\n\nGoal: Find attractive stock investment opportunities for the coming weeks/months by screening for:\n1. Stocks with strong upward momentum.\n2. Stocks that recently crashed due to panic selling, overreaction, temporary fear, or broad market weakness.\n3. Stocks with improving fundamentals, insider/institutional interest, attractive valuation, upcoming catalysts, or asymmetric risk/reward.\n\nUse the most recent available market data, news, earnings reports, analyst updates, SEC filings, macro data, and price charts. Cite all important sources and clearly separate facts from assumptions.\n\n## Investor profile\n\n- Base currency: EUR\n- Country: Finland\n- Risk tolerance: medium to high\n- Investment horizon: 3 months to 3 years\n- Preferred markets: US stocks first, then Europe if opportunities are compelling\n- Avoid: penny stocks, illiquid microcaps, obvious pump-and-dump setups, companies with bankruptcy risk unless explicitly marked as speculative\n- Portfolio style: concentrated but risk-controlled\n- Maximum position size for one stock: 10% of portfolio\n- Normal position size: 2–5%\n- Cash should remain available if opportunities are weak\n\n## Task\n\nFind 5–10 stocks worth deeper consideration this week. Classify each opportunity into one or more of these scenarios:\n\n### A. Momentum opportunity\nStocks showing strong price action supported by volume, relative strength, earnings growth, guidance upgrades, sector tailwinds, or institutional accumulation.\n\nLook for:\n- New 3-month, 6-month, or 52-week highs\n- Strong relative strength versus S&P 500 / Nasdaq / sector ETF\n- Positive earnings surprise or guidance raise\n- Rising revenue, margins, or free cash flow\n- Healthy volume confirmation\n- Strong sector trend\n\n### B. Panic-sell / overreaction opportunity\nStocks that recently dropped sharply but may have been oversold due to temporary fear, broad market selloff, misunderstood earnings, legal/political noise, analyst downgrade, or short-term margin pressure.\n\nLook for:\n- Drop of 10–30%+ in a short period\n- News-driven selloff where long-term thesis may still be intact\n- RSI/technical oversold conditions, but not value traps\n- Insider buying, buybacks, or management confidence\n- Strong balance sheet\n- No clear permanent impairment\n\n### C. Valuation re-rating opportunity\nStocks where valuation looks cheap relative to growth, cash flow, peers, or historical multiples.\n\nLook for:\n- Low forward P/E, EV/EBITDA, P/S, or FCF yield versus peers\n- Improving margins or profitability\n- Market underappreciating future growth\n- Strong balance sheet\n- Clear catalyst for re-rating\n\n### D. Catalyst opportunity\nStocks with upcoming catalysts that could move the price.\n\nExamples:\n- Earnings report\n- Product launch\n- Regulatory decision\n- AI/cloud/semiconductor/defence/energy/healthcare catalyst\n- Index inclusion\n- Spin-off\n- M&A possibility\n- Major contract\n- Buyback announcement\n- Rate-cut sensitivity\n\n### E. Quality compounder temporarily ignored\nHigh-quality businesses that are not necessarily cheap but have durable competitive advantages and long-term compounding potential.\n\nLook for:\n- High ROIC / ROE\n- Strong free cash flow\n- Durable moat\n- Low debt or manageable debt\n- Recurring revenue\n- Pricing power\n- Long-term secular growth\n\n## Analysis requirements for each stock\n\nFor each candidate, provide:\n\n1. Company name and ticker\n2. Market cap\n3. Sector / industry\n4. Current price\n5. 52-week range\n6. Recent price performance:\n   - 1 week\n   - 1 month\n   - 3 months\n   - YTD\n7. Scenario category:\n   - Momentum\n   - Panic-sell rebound\n   - Valuation\n   - Catalyst\n   - Quality compounder\n8. Why it is interesting now\n9. Key recent news or catalyst\n10. Fundamental snapshot:\n   - Revenue growth\n   - Earnings growth\n   - Gross/operating margin trend\n   - Free cash flow\n   - Debt level\n   - Valuation versus peers\n11. Technical snapshot:\n   - Trend direction\n   - Support levels\n   - Resistance levels\n   - Moving averages: 50-day and 200-day\n   - Volume behaviour\n   - RSI or overbought/oversold condition\n12. Bull case\n13. Bear case\n14. Main risks\n15. What would invalidate the thesis\n16. Suggested entry strategy:\n   - Buy now\n   - Wait for pullback\n   - Buy in tranches\n   - Wait for confirmation\n17. Suggested holding period:\n   - Short term: 1–3 months\n   - Medium term: 3–12 months\n   - Long term: 1–3 years\n18. Suggested cut-loss level\n19. Suggested take-profit levels\n20. Suggested portfolio allocation percentage\n21. Confidence score from 1–10\n22. Risk score from 1–10\n23. Risk/reward rating:\n   - Excellent\n   - Good\n   - Fair\n   - Poor\n\n## Scoring model\n\nScore each stock from 0–100 using this framework:\n\n- Momentum: 20 points\n- Fundamental quality: 20 points\n- Valuation attractiveness: 15 points\n- Catalyst strength: 15 points\n- Balance sheet safety: 10 points\n- Technical setup: 10 points\n- Risk/reward asymmetry: 10 points\n\nThen rank the stocks by total score.\n\n## Output format\n\nFirst, give an executive summary:\n\n- Best overall opportunity this week\n- Best momentum stock\n- Best panic-sell rebound candidate\n- Best long-term compounder\n- Best speculative/high-upside idea\n- Stocks to avoid despite looking cheap\n- Whether this week is a good time to deploy capital or stay mostly in cash\n\nThen provide a table:\n\n| Rank | Ticker | Company | Scenario | Score /100 | Risk | Suggested Allocation | Entry Strategy | Holding Period | Cut Loss | Take Profit |\n\nAfter the table, give detailed analysis for each stock.\n\nFinally, conclude with:\n\n1. Top 3 buys this week\n2. Top 3 watchlist names\n3. Stocks that looked interesting but were rejected, with reasons\n4. Suggested portfolio deployment plan:\n   - Aggressive version\n   - Balanced version\n   - Conservative version\n5. Key market risks to monitor next week\n\n## Rules\n\n- Do not recommend a stock only because it dropped.\n- Do not recommend a stock only because it has gone up.\n- Avoid hype unless supported by earnings, cash flow, guidance, or credible catalysts.\n- Be sceptical of companies with high debt, falling revenue, dilution, weak margins, accounting concerns, or unclear business models.\n- For panic-sell opportunities, clearly explain whether the drop is likely temporary or caused by permanent business damage.\n- For momentum opportunities, clearly explain whether the move is still investable or already overextended.\n- Always compare upside potential against downside risk.\n- Include citations for market data, earnings data, and news.\n- If data is unavailable or uncertain, say so directly.\n- This is research support, not financial advice.\n- Use [@alpaca](plugin://alpaca@openai-curated) for financial data. You must do web search for up-to-date information\n- Focus especially on stocks that had major price moves, earnings reactions, analyst upgrades/downgrades, insider buying, or unusual volume during the last 5 trading days."
